<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fojji Foundation - Official Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-img {
            height: 250px; 
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f4;
            border-radius: 8px 8px 0 0;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top; /* Ensures the face is visible */
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Fojji Foundation</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#shop">Shop</a></li>
                <li><a href="#cart" class="cart-btn">Cart (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Welcome to the Fojji Foundation</h1>
            <p>Premium quality products with a purpose. Shop our latest collection.</p>
            <a href="#shop" class="btn">Shop Now</a>
        </div>
    </section>

    <section id="shop" class="products-section">
        <h2>Featured Products</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <div class="product-img">
                    <img src="product-image/product1.jpg" alt="Classic Foundation Tee">
                </div>
                <h3>Classic Foundation Tee</h3>
                <p class="price">$25.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="product-img">
                    <img src="product-image/product2.jpg" alt="Support Care Package">
                </div>
                <h3>Support Care Package</h3>
                <p class="price">$50.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>

            </div>
    </section>

    <footer>
        <p>&copy; 2026 Fojji Foundation. All Rights Reserved.</p>
    </footer>

</body>
</html>
